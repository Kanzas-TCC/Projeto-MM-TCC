name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            pm2 stop tailwind-dev
            cd /home/user1/projeto-tcc-dev
            rm src/css/tailwind-compiled.css
            git pull origin main
            cd /home/user1/projeto-tcc-dev/backend
            npm i
            npx tsc
            pm2 restart modamym-dev
            pm2 start tailwind-dev
